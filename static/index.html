<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Prediction from Medical Data — CodeAlpha Task 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header class="app-header">
            <div class="badge">CodeAlpha ML Internship — Task 4</div>
            <h1>Disease Prediction from Medical Data</h1>
            <p>Predict risk of Heart Disease and Diabetes using SVM, XGBoost, and Random Forest Classifiers.</p>
        </header>

        <main class="dashboard-grid">
            <div class="card input-card">
                <h2>Clinical Health Parameters</h2>
                <form id="medical-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="age">Age (years)</label>
                            <input type="number" id="age" value="52" min="18" max="100">
                        </div>
                        <div class="input-group">
                            <label for="gender">Gender</label>
                            <select id="gender">
                                <option value="1">Male</option>
                                <option value="0">Female</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="chest_pain_type">Chest Pain Type</label>
                            <select id="chest_pain_type">
                                <option value="0">Typical Angina</option>
                                <option value="1">Atypical Angina</option>
                                <option value="2">Non-anginal Pain</option>
                                <option value="3">Asymptomatic</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="resting_bp">Resting Blood Pressure (mmHg)</label>
                            <input type="number" id="resting_bp" value="135" min="80" max="220">
                        </div>
                        <div class="input-group">
                            <label for="cholesterol">Serum Cholesterol (mg/dL)</label>
                            <input type="number" id="cholesterol" value="245" min="100" max="600">
                        </div>
                        <div class="input-group">
                            <label for="fasting_bs">Fasting Blood Sugar > 120 mg/dL</label>
                            <select id="fasting_bs">
                                <option value="0">No (<= 120)</option>
                                <option value="1">Yes (> 120)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="max_hr">Maximum Heart Rate (bpm)</label>
                            <input type="number" id="max_hr" value="142" min="60" max="220">
                        </div>
                        <div class="input-group">
                            <label for="exercise_angina">Exercise Induced Angina</label>
                            <select id="exercise_angina">
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="oldpeak">ST Depression (Oldpeak)</label>
                            <input type="number" id="oldpeak" value="1.4" step="0.1" min="0">
                        </div>
                        <div class="input-group">
                            <label for="glucose">Fasting Glucose (mg/dL)</label>
                            <input type="number" id="glucose" value="125" min="50" max="350">
                        </div>
                        <div class="input-group">
                            <label for="bmi">Body Mass Index (BMI)</label>
                            <input type="number" id="bmi" value="28.4" step="0.1" min="10" max="60">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Run Medical Risk Assessment</button>
                </form>
            </div>

            <div class="card result-card">
                <h2>Diagnostic Risk Assessment</h2>
                
                <div class="disease-card">
                    <div class="disease-header">
                        <h3>❤️ Heart Disease Risk</h3>
                        <span class="status-pill" id="heart-pill">--</span>
                    </div>
                    <div class="risk-meter">
                        <div class="risk-bar" id="heart-bar" style="width: 0%"></div>
                    </div>
                    <div class="risk-val" id="heart-val">0% Probability</div>
                </div>

                <div class="disease-card">
                    <div class="disease-header">
                        <h3>🩸 Diabetes Risk</h3>
                        <span class="status-pill" id="diabetes-pill">--</span>
                    </div>
                    <div class="risk-meter">
                        <div class="risk-bar" id="diabetes-bar" style="width: 0%"></div>
                    </div>
                    <div class="risk-val" id="diabetes-val">0% Probability</div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
